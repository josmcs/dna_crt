<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login • DNAC → SecureCRT Exporter</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0b1220;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .glass {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .brand-pill {
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: .35rem .85rem;
      font-size: 0.9rem;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    .muted {
      color: rgba(255,255,255,0.7);
    }

    input.form-control {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
    }

    input.form-control:focus {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-color: rgba(255,255,255,0.35);
      box-shadow: none;
    }

    .btn-primary {
      background: #0d6efd;
      border: none;
      padding: 0.65rem;
      font-size: 1.1rem;
      border-radius: 10px;
    }

    .error-box {
      background: rgba(255,0,0,0.15);
      border: 1px solid rgba(255,0,0,0.35);
      padding: .75rem 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      color: #ffb3b3;
    }
  </style>
</head>

<body>

  <div class="glass">
    <div class="text-center">
      <span class="brand-pill">DNAC → SecureCRT Session Exporter</span>
      <h3 class="mb-3">Sign in</h3>
      <p class="muted mb-4">Authenticate with your network credentials</p>
    </div>

    {% if error %}
      <div class="error-box">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" action="/dna_crt/login">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" name="username" required autofocus>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required>
      </div>

      <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>

    <p class="muted text-center mt-4 small">
      No credentials are stored • Secure internal authentication
    </p>
  </div>

</body>
</html>
