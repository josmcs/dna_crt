<!doctype html>
<html lang="en">
<head>
  <meta name="author" content="Joe McSparin">
  <meta name="version" content="3.0.0">
  <meta name="updated" content="2026-02-25">
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Job status</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0b1220; }
    .glass { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px; backdrop-filter: blur(10px); }
    .muted { color: rgba(255,255,255,0.7); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .logbox { height: 260px; overflow: auto; background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.10); border-radius: 14px; padding: 12px; }
  </style>
</head>
<body class="text-light">
  <main class="container py-4">
    <div class="p-4 glass">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div>
          <h3 class="mb-1">Job status</h3>
          <div class="muted">Job ID: <span class="mono">{{ job_id }}</span></div>
        </div>
		<div id="user-banner"
			 style="
				background: rgba(255,255,255,0.06);
				border: 1px solid rgba(255,255,255,0.12);
				backdrop-filter: blur(10px);
				padding: 10px;
				font-size: 16px;
				font-weight: bold;
				color: #fff;
				margin-bottom: 15px;
			 ">
		  Loading user info...
		</div>

        <div class="d-flex gap-2">
          <a class="btn btn-outline-light" href="/dna_crt/start">New run</a>
          <a class="btn btn-success disabled" id="downloadBtn" href="/dna_crt/download/{{ job_id }}">Download ZIP</a>
        </div>
      </div>

      <hr class="border-light opacity-25"/>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="mb-3">
            <div class="d-flex justify-content-between mb-1">
              <span class="muted" id="phase">Starting…</span>
              <span class="muted"><span id="progressText">0%</span></span>
            </div>
            <div class="progress" role="progressbar" aria-label="Progress">
              <div class="progress-bar" id="bar" style="width: 1%"></div>
            </div>
          </div>

          <div class="logbox mono" id="logs"></div>
        </div>

        <div class="col-lg-5">
          <div class="p-3 border border-light border-opacity-10 rounded-4">
            <h6 class="mb-2">Run details</h6>
            <div class="muted small mono" id="details"></div>
          </div>

          <div class="mt-3 alert alert-warning bg-transparent text-light border" id="errBox" style="display:none;"></div>
          <div class="alert alert-info bg-transparent text-light border" role="alert">
            The downloaded zip file will contain a readme.txt file with instructions for locating your SecureCRT sessions folder and extracting the contents.
          </div>
        </div>
      </div>
    </div>
  </main>

<script>
  const jobId = "{{ job_id }}";
  const logsEl = document.getElementById("logs");
  const phaseEl = document.getElementById("phase");
  const barEl = document.getElementById("bar");
  const progressTextEl = document.getElementById("progressText");
  const detailsEl = document.getElementById("details");
  const errBox = document.getElementById("errBox");
  const downloadBtn = document.getElementById("downloadBtn");

  let lastLogLen = 0;

  function esc(s) {
    return (s ?? "").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
  }

  async function poll() {
    const r = await fetch(`/dna_crt/api/job/${jobId}`);
    if (!r.ok) return;
    const data = await r.json();

    phaseEl.textContent = data.phase ?? "…";

    let pct = 5;
    if (data.total_devices && data.processed_devices != null) {
      pct = Math.min(100, Math.max(1, Math.round((data.processed_devices / data.total_devices) * 100)));
    } else if (data.fetched_devices != null) {
      pct = 15;
    }
    barEl.style.width = `${pct}%`;
    progressTextEl.textContent = `${pct}%`;

    const logs = data.logs ?? [];
    if (logs.length !== lastLogLen) {
      lastLogLen = logs.length;
      logsEl.innerHTML = logs.map(esc).join("<br/>");
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    detailsEl.innerHTML = esc(JSON.stringify({
      fetched_devices: data.fetched_devices,
      total_devices: data.total_devices,
      processed_devices: data.processed_devices
    }, null, 2));

    if (data.error) {
      errBox.style.display = "block";
      errBox.textContent = data.error;
    }

    if (data.done && !data.error) {
      barEl.style.width = "100%";
      progressTextEl.textContent = "100%";
      downloadBtn.classList.remove("disabled");
      downloadBtn.classList.add("btn-success");
      return;
    }

    if (data.done && data.error) {
      barEl.classList.add("bg-danger");
      return;
    }

    setTimeout(poll, 1000);
  }

  poll();
</script>
<script>
async function loadUserBanner() {
    try {
        const response = await fetch('/dna_crt/userinfo');
        if (!response.ok) {
            document.getElementById('user-banner').innerText = "Not logged in";
            return;
        }

        const user = await response.json();
        document.getElementById('user-banner').innerText =
            `Logged in as ${user.name} (${user.username})`;
    } catch (err) {
        document.getElementById('user-banner').innerText = "Unable to load user info";
    }
}

loadUserBanner();
</script>

</body>
</html>
